services:
 

  rabbitmq_CEJ_Peru:
    image: rabbitmq:3-management
    container_name: rabbitmq_CEJ_Peru
    ports:
      - "5672:5672"      
      - "15672:15672"   
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit consumer_timeout 1800000 -rabbit heartbeat 30"
    networks:
      - CEJ_Peru_net
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 40s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 2048M
    restart: always
  
  ssh_CEJ_Peru:
    image: alpine:latest
    container_name: ssh_CEJ_Peru
    volumes:
      - ./stack/ssh_tunnel/bd-tunnel.sh:/bd-tunnel.sh:ro
      - ./stack:/keys
    command: sh /bd-tunnel.sh
    env_file:
      - ./stack/ssh_tunnel/.env
    networks:
      - CEJ_Peru_net
    restart: always
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -tn | grep -q ESTABLISHED"]
      interval: 30s
      timeout: 15s
      retries: 4
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  ms_watcher_cej:
    image: ms_watcher_cej:latest
    container_name: ms_watcher_cej
    restart: always
    build:
      context: ./ms_watcher_cej
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5090:5090"
    
    networks:
      - CEJ_Peru_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5090"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    init: true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    depends_on:
      rabbitmq_CEJ_Peru:
        condition: service_healthy

  worker_cej:
      build:
        context: ./worker_cej
        dockerfile: Dockerfile

      depends_on:
        ms_watcher_cej:
          condition: service_healthy
      networks:
        - CEJ_Peru_net
      restart: always
      volumes:
        - ./temp:/app/temp
        - /etc/localtime:/etc/localtime:ro
        - /etc/timezone:/etc/timezone:ro
      logging:
        driver: "json-file"
        options:
          max-size: "20m"
          max-file: "5"
      init: true
      deploy:
        replicas: 5

        resources:
          limits:
            memory: 2000m


